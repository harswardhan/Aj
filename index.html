<body>
    <div class="container">
        <h1>FF NAME GENERATOR PRO</h1>

        <div id="rare" class="tab-content">

            <div class="letter-grid" id="khmerCapGrid"></div>
            
            <div class="tab-title" style="margin-top: 20px;">KHMER small a-z</div>

    <div class="toast" id="toast">Copied!</div>

    <script>
        const safeSymbols = ['ツ','么','乂','々','〆','〱','〷','ゞ','〽️','꧔','꧁','꧂','𒆜','『','』','◤','◢','♛','♕','★','☬','〄','۝','๛','♡','♥','乛','♝','乡','彡','ミ','个','〠','〶','の','◥','◣','△','▽','▲','▼','◆','◇'];

        const rareSymbols = ['亗','⸙','𓆩','𓆪','𖤍','𓂀','𖠌','ᶦᶰᵈ᭄','࿐','࿇','𓆣','𓆏','𓃶','𓊈','𓊉','𓋜','𐂃','ꕥ','𓅓','ꪶ','ꫂ','❖','✘','𒁂','⛩','𐐘','𓄿','𓀂','𓁹','𓃗','𓅃','𓆈','𓇽','𓏲','𐘩','𐚁','𐚂','᯽','𖣘','𖣂','𖤐','𖥂','𖧷','𐂂','𐂯','𐃆','𐄑','𐤉','𐌑','𐍈','𐎂','𐏓'];

        const khmerCapital = ['ꪖ','ꪚ','ꫀ','ꫛ','ꫀ','ꫝ','ꪻ','ꫝ','꠸','꠹','ꪹ','ꪶ','ꪑ','ꪀ','ꪮ','ꪜ','ꫝ','ꫀ','ꕶ','ꫝ','ꪊ','ꪜ','ꪝ','ꪄ','ꪗ','ꫂ'];
        const khmerSmall = ['ᥲ','Ⴙ','ᥴ','ᶁ','ᥱ','ꫝ','ᧁ','Ⴙ','Ꭵ','᧐','ᛕ','ꪶ','ꪑ','ᥒ','᥆','ᤢ','ꫝ','ᖇ','᥉','ᤃ','ᥙ','᥎','ᥕ','᥊','ꪗ','ꪑ'];

        function openTab(tabName, btn) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(button => {
                button.classList.remove('active');
            });
            document.getElementById(tabName).classList.add('active');
            btn.classList.add('active');
        }

        function toSmallCaps(str) {
            const map = {a:'ᴀ',b:'ʙ',c:'ᴄ',d:'ᴅ',e:'ᴇ',f:'ғ',g:'ɢ',h:'ʜ',i:'ɪ',j:'ᴊ',k:'ᴋ',l:'ʟ',m:'ᴍ',n:'ɴ',o:'ᴏ',p:'ᴘ',q:'ǫ',r:'ʀ',s:'s',t:'ᴛ',u:'ᴜ',v:'ᴠ',w:'ᴡ',x:'x',y:'ʏ',z:'ᴢ'};
            return str.toLowerCase().split('').map(c => map[c] || c).join('');
        }

        function toFullWidth(str) {
            return str.split('').map(c => {
                const code = c.charCodeAt(0);
                return code >= 33 && code <= 126? String.fromCharCode(code + 0xFEE0) : c;
            }).join('');
        }

        function toBold(str) {
            const map = {A:'𝐀',B:'𝐁',C:'𝐂',D:'𝐃',E:'𝐄',F:'𝐅',G:'𝐆',H:'𝐇',I:'𝐈',J:'𝐉',K:'𝐊',L:'𝐋',M:'𝐌',N:'𝐍',O:'𝐎',P:'𝐏',Q:'𝐐',R:'𝐑',S:'𝐒',T:'𝐓',U:'𝐔',V:'𝐕',W:'𝐖',X:'𝐗',Y:'𝐘',Z:'𝐙',a:'𝐚',b:'𝐛',c:'𝐜',d:'𝐝',e:'𝐞',f:'𝐟',g:'𝐠',h:'𝐡',i:'𝐢',j:'𝐣',k:'𝐤',l:'𝐥',m:'𝐦',n:'𝐧',o:'𝐨',p:'𝐩',q:'𝐪',r:'𝐫',s:'𝐬',t:'𝐭',u:'𝐮',v:'𝐯',w:'𝐰',x:'𝐱',y:'𝐲',z:'𝐳'};
            return str.split('').map(c => map[c] || c).join('');
        }

        function toItalic(str) {
            const map = {A:'𝘈',B:'𝘉',C:'𝘊',D:'𝘋',E:'𝘌',F:'𝘍',G:'𝘎',H:'𝘏',I:'𝘐',J:'𝘑',K:'𝘒',L:'𝘓',M:'𝘔',N:'𝘕',O:'𝘖',P:'𝘗',Q:'𝘘',R:'𝘙',S:'𝘚',T:'𝘛',U:'𝘜',V:'𝘝',W:'𝘞',X:'𝘟',Y:'𝘠',Z:'𝘡',a:'𝘢',b:'𝘣',c:'𝘤',d:'𝘥',e:'𝘦',f:'𝘧',g:'𝘨',h:'𝘩',i:'𝘪',j:'𝘫',k:'𝘬',l:'𝘭',m:'𝘮',n:'𝘯',o:'𝘰',p:'𝘱',q:'𝘲',r:'𝘳',s:'𝘴',t:'𝘵',u:'𝘶',v:'𝘷',w:'𝘸',x:'𝘹',y:'𝘺',z:'𝘻'};
            return str.split('').map(c => map[c] || c).join('');
        }

        function generateNames() {
            const name = document.getElementById('nameInput').value.trim() || 'Oxie';
            const grid = document.getElementById('nameGrid');
            grid.innerHTML = '';

            let styles = [];

            styles.push(toSmallCaps(name));
            styles.push(toFullWidth(name));
            styles.push(toBold(name));
            styles.push(toItalic(name));
            styles.push(name.toUpperCase());
            styles.push(name.toLowerCase());

            safeSymbols.slice(0, 20).forEach(s => styles.push(s + name + s));
            safeSymbols.slice(0, 20).forEach(s => styles.push(name + s));
            rareSymbols.slice(0, 20).forEach(s => styles.push(s + name + s));
            rareSymbols.slice(0, 20).forEach(s => styles.push(name + s));

            styles.push(`꧁༒${name}༒꧂`);
            styles.push(`『${toSmallCaps(name)}』`);
            styles.push(`亗${name}亗`);
            styles.push(`𓆩${name}𓆪`);
            styles.push(`么${name}么`);
            styles.push(`◤${toFullWidth(name)}◢`);
            styles.push(`♛${name}♛`);
            styles.push(`𖤍${name}𖤍`);
            styles.push(`ᴳᵒᵈ ${name}`);
            styles.push(`${name}࿐`);
            styles.push(`乂${name}乂`);
            styles.push(`★彡${name}彡★`);
            styles.push(`𒆜${name}𒆜`);
            styles.push(`꧁${name}ツ꧂`);
            styles.push(`${name}〆`);

            while(styles.length < 200) {
                const s1 = safeSymbols[Math.floor(Math.random() * safeSymbols.length)];
                const s2 = rareSymbols[Math.floor(Math.random() * rareSymbols.length)];
                styles.push(s1 + name + s2);
            }

            styles.slice(0, 200).forEach(style => {
                const div = document.createElement('div');
                div.className = 'item';
                div.textContent = style;
                div.title = style;
                div.onclick = () => copyText(style);
                grid.appendChild(div);
            });
        }

        function loadSymbols() {
            const safeGrid = document.getElementById('safeGrid');
            const khmerCapGrid = document.getElementById('khmerCapGrid');
            const khmerSmallGrid = document.getElementById('khmerSmallGrid');

            // SAFE SYMBOLS me dono mix kar diye - safe + rare
            [...safeSymbols,...rareSymbols].forEach(s => {
                const div = document.createElement('div');
                div.className = 'item';
                div.textContent = s;
                div.onclick = () => copyText(s);
                safeGrid.appendChild(div);
            });

            // KHMER A-Z ab RARE tab me
            khmerCapital.forEach(s => {
                const div = document.createElement('div');
                div.className = 'letter';
                div.textContent = s;
                div.onclick = () => copyText(s);
                khmerCapGrid.appendChild(div);
            });

            khmerSmall.forEach(s => {
                const div = document.createElement('div');
                div.className = 'letter';
                div.textContent = s;
                div.onclick = () => copyText(s);
                khmerSmallGrid.appendChild(div);
            });
        }

        function randomName() {
            const name = document.getElementById('nameInput').value.trim() || 'Oxie';
            const s1 = rareSymbols[Math.floor(Math.random() * rareSymbols.length)];
            const s2 = safeSymbols[Math.floor(Math.random() * safeSymbols.length)];
            const styles = [
                `꧁༒${s1}${name}༒꧂`,
                `${s1}${toSmallCaps(name)}${s2}`,
                `𓆩${name}𓆪${s1}`,
                `${s2}${toFullWidth(name)}${s1}`,
                `亗${name}${s2}`
            ];
            const random = styles[Math.floor(Math.random() * styles.length)];
            copyText(random);
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.textContent = `Copied: ${text}`;
                toast.style.display = 'block';
                setTimeout(() => toast.style.display = 'none', 2000);
            });
        }

        window.onload = () => {
            loadSymbols();
            generateNames();
        };
    </script>
